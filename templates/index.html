<!DOCTYPE html>
<html>
<body>
    <h1>My Submission Form</h1>

    {% if error_msg %}
        <p style="color: red;">{{ error_msg }}</p>
    {% endif %}

    <form action="/submittodoitem" method="POST">
        <input type="text" name="itemName" placeholder="Item Name">
        <textarea name="itemDescription" placeholder="Item Description"></textarea>
        
        <input type="text" name="itemId" placeholder="Item ID">
        
        <button type="submit">Send to Mongo</button>
    </form>
</body>
</html>
