<!DOCTYPE html>
<html>
<head>
    <title>My Submission Form</title>
</head>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Submission Form</title>
</head>
<body>
    <h1>My Submission Form</h1>

    <!-- Inline Error Block: Stays on same page without redirection -->
    {% if error_msg %}
        <p style="color: red;"><strong>{{ error_msg }}</strong></p>
    {% endif %}

    <form action="/submittodoitem" method="POST">
        <p>
            <label>Item Name:</label><br>
            <input type="text" name="itemName" required>
        </p>
        <p>
            <label>Item Description:</label><br>
            <textarea name="itemDescription" required></textarea>
        </p>
        
        <p>
            <label>Item ID:</label><br>
            <input type="text" name="itemId">
        </p>
        
        <p>
            <label>Item UUID:</label><br>
            <input type="text" name="itemUuid">
        </p>
        
        <p>
            <label>Item Hash:</label><br>
            <input type="text" name="itemHash">
        </p>

        <button type="submit">Send to Mongo</button>
    </form>
</body>
</html>
